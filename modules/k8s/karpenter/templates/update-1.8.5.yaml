# Patches Karpenter CRDs to remove stale conversion webhook config
# that blocks ArgoCD sync when upgrading from 1.0.x
# Runs as PreSync hook so it executes before Karpenter chart resources
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-crd-patch
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-crd-patch
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    resourceNames:
      - "nodepools.karpenter.sh"
      - "nodeclaims.karpenter.sh"
      - "ec2nodeclasses.karpenter.k8s.aws"
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-crd-patch
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-crd-patch
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-crd-patch
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-crd-patch
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-crd-patch
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: patch
          image: {{ .Values.job.image }}:{{ .Values.job.tag }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
              ephemeral-storage: 64Mi
          command:
            - /bin/sh
            - -c
            - |

              #!/bin/sh
              CRDS="nodepools.karpenter.sh nodeclaims.karpenter.sh ec2nodeclasses.karpenter.k8s.aws"
              for crd in ${CRDS}; do
                if ! kubectl get crd "${crd}" > /dev/null 2>&1; then
                  echo "SKIP: ${crd} (CRD does not exist)"
                  continue
                fi
                # Check if conversion field exists before patching
                if kubectl get crd "${crd}" -o jsonpath='{.spec.conversion}' 2>/dev/null | grep -q .; then
                  kubectl patch crd "${crd}" --type=json \
                    -p='[{"op":"remove","path":"/spec/conversion"}]' && \
                    echo "OK: ${crd} patched" || echo "FAIL: ${crd} patch failed"
                else
                  echo "SKIP: ${crd} (no conversion field)"
                fi
              done
              echo "Done."
