apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{.Values.crossplane.priorityClassName}}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
value: 999999
preemptionPolicy: PreemptLowerPriority
globalDefault: false
description: "This priority class will cause other pods to be preempted since Crossplane is very important."
