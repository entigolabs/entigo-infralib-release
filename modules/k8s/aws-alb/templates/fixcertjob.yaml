apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-certfix
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-certfix
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["aws-load-balancer-tls"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  resourceNames: ["{{ .Release.Name }}-aws-load-balancer-controller"]
  verbs: ["get", "patch"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
  resourceNames: ["aws-load-balancer-webhook"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-certfix
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-certfix
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-certfix
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-certfix
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    kube-score/ignore: pod-networkpolicy
spec:
  activeDeadlineSeconds: 600
  parallelism: 1
  completions: 1
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-certfix
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 90
            preference:
              matchExpressions:
              - key: tools
                operator: In
                values:
                - "true"
      tolerations:
        - key: "tools"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: kubectl
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        image: {{ .Values.job.image }}:{{ .Values.job.tag }}
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
            ephemeral-storage: 200Mi
          requests:
            cpu: 1m
            memory: 16Mi
            ephemeral-storage: 2Mi
        command:
        - /bin/bash
        - -c
        - |
          CA_BUNDLE=$(kubectl get secret aws-load-balancer-tls -n {{ .Release.Namespace }} -o jsonpath='{.data.ca\.crt}')

          for TYPE in validatingwebhookconfiguration mutatingwebhookconfiguration; do
            COUNT=$(kubectl get $TYPE aws-load-balancer-webhook -o jsonpath='{range .webhooks[*]}{.name}{"\n"}{end}' | wc -l | tr -d ' ')
            if [ "$COUNT" -gt 0 ]; then
              PATCH=$(seq 0 $((COUNT-1)) | awk -v ca="$CA_BUNDLE" 'BEGIN{printf "["} NR>1{printf ","} {printf "{\"op\":\"replace\",\"path\":\"/webhooks/%d/clientConfig/caBundle\",\"value\":\"%s\"}", $1, ca} END{printf "]"}')
              kubectl patch $TYPE aws-load-balancer-webhook --type='json' -p="$PATCH"
            fi
          done

          kubectl rollout restart deployment -n {{ .Release.Namespace }} {{ .Release.Name }}-aws-load-balancer-controller
      restartPolicy: Never
  backoffLimit: 5
