global:
  cloudProvider: ""

wireguard:
  wireguard:
    serverAddress: ""
    serverCidr: ""
    clients: []
  image:
    tag: "20250306-d267b30"
    pullPolicy: IfNotPresent
  initContainer:
    image:
      tag: "1.37.0"
  replicaCount: 2
  disruptionBudget:
    minAvailable: 1
  autoscaling:
    enabled: false
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false
  healthSideCar:
    enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
        ephemeral-storage: 8Mi
      limits:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 128Mi
    service:
      enabled: false
  podAnnotations:
    kube-score/ignore: pod-networkpolicy,pod-probes,container-security-context-privileged
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
      ephemeral-storage: 8Mi
    limits:
      cpu: 1000m
      memory: 128Mi
      ephemeral-storage: 128Mi
  keygenJob:
    useWireguardManager: true
    wireguardMgrImage:
      tag: 20250512-7dab026
      pullPolicy: IfNotPresent
    image:
      tag: 20241030-7d8d487
      pullPolicy: IfNotPresent
    podAnnotations:
      kube-score/ignore: pod-networkpolicy,pod-probes
    containerSecurityContext:
      capabilities:
        drop:
          - ALL
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 90
          preference:
            matchExpressions:
              - key: tools
                operator: In
                values:
                  - "true"
        - weight: 10
          preference:
            matchExpressions:
              - key: mon
                operator: In
                values:
                  - "true"
  tolerations:
    - key: "tools"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
    - key: "mon"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
